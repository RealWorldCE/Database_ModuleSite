<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real World CE | Module Portal</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(135deg, #07111d, #10243a 55%, #1f5f93);
      color: #fff;
    }
    .loader {
      width: min(92vw, 520px);
      padding: 2rem;
      border-radius: 1.5rem;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 28px 90px rgba(0,0,0,.35);
      backdrop-filter: blur(18px);
      text-align: center;
    }
    .loader h1 { margin: 0 0 .5rem; font-size: 1.45rem; }
    .loader p { margin: 0; color: rgba(255,255,255,.78); line-height: 1.5; }
  </style>
</head>
<body>

  <div class="loader" id="portal-loader">
    <h1>Loading Real World CE Portal</h1>
    <p>Securely fetching the latest clinical modules...</p>
  </div>

  <script>
    (async function loadUpdatedPortal() {
      const sourceUrl = 'https://raw.githubusercontent.com/RealWorldCE/Module_Site/0e7f01ff08ffa6cf6cb1625820ed586743f7783a/index.html';

      // --- INJECT A LINK TO THE NEW ADMIN PORTAL ---
      // This creates a sleek floating button in the bottom-left corner
      const adminButtonUI = `
      <style>
        #rwce-admin-link {
          position: fixed; bottom: 24px; left: 24px; z-index: 99998;
          background: #002147; color: #00e5ff; border: 1px solid rgba(0, 229, 255, 0.3);
          padding: 12px 24px; border-radius: 99px; font-weight: 700; cursor: pointer;
          box-shadow: 0 10px 25px rgba(0,33,71,0.6); font-family: 'Inter', sans-serif;
          display: flex; align-items: center; gap: 8px; transition: all 0.3s ease;
          text-decoration: none;
        }
        #rwce-admin-link:hover { 
          transform: translateY(-3px); 
          box-shadow: 0 15px 30px rgba(0, 229, 255, 0.2); 
          background: #003366; 
          color: white;
        }
      </style>

      <a href="admin.html" id="rwce-admin-link" target="_blank">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
        Admin Dashboard
      </a>
      `;

      try {
        let html = await fetch(sourceUrl, { cache: 'no-store' }).then(function(response) {
          if (!response.ok) {
            throw new Error('Unable to load source HTML. Status: ' + response.status);
          }
          return response.text();
        });

        // Retain your previous formatting logic
        html = html.replace(
          /<article([^>]*data-title="real quiz realworldce\/real-quiz"[\s\S]*?)<\/article>/i,
          function(fullCard) {
            return fullCard
              .replace(/(<div class="marketing-card__specialty"><span[^>]*>quiz<\/span><span>)Assessment(<\/span><\/div>)/i, '$1MODULE$2')
              .replace(/(<span class="marketing-format-pill">)Assessment(<\/span>)/gi, '$1MODULE$2')
              .replace(/(<span class="preview-subtitle">)Assessment • Assessment(<\/span>)/gi, '$1MODULE • Assessment$2');
          }
        );

        // Inject the admin button right before the closing </body> tag
        html = html.replace('</body>', adminButtonUI + '</body>');

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML = `
          <div class="loader">
            <h1>Module Portal could not load</h1>
            <p>${error.message}</p>
          </div>
        `;
      }
    })();
  </script>
</body>
</html>
